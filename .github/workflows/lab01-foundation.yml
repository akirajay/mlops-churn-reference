name: Lab 01 - Foundation

on:
  push:
    paths: [ 'infra/**', '.github/workflows/lab01-foundation.yml' ]
    branches: [ main ]
  pull_request:
    paths: [ 'infra/**' ]
  workflow_dispatch:

permissions:
  id-token: write     # OIDC
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_OIDC_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_OIDC_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_OIDC_SUBSCRIPTION_ID }}
      - name: Bicep build
        run: az bicep build --file infra/main.bicep
      - name: What-if (dev)
        run: |
          az deployment group what-if -g rg-churn-dev \
            -f infra/main.bicep -p infra/env/dev.bicepparam

  deploy-shared:
    needs: validate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_OIDC_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_OIDC_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_OIDC_SUBSCRIPTION_ID }}
      - run: |
          az deployment group create -g rg-churn-shared \
            -f infra/shared.bicep --query properties.provisioningState

  deploy-dev:
    needs: deploy-shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_OIDC_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_OIDC_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_OIDC_SUBSCRIPTION_ID }}
      - run: |
          az deployment group create -g rg-churn-dev \
            -f infra/main.bicep -p infra/env/dev.bicepparam \
            --query properties.provisioningState

  deploy-prod:
    needs: deploy-dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_OIDC_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_OIDC_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_OIDC_SUBSCRIPTION_ID }}
      - run: |
          az deployment group create -g rg-churn-prod \
            -f infra/main.bicep -p infra/env/prod.bicepparam \
            --query properties.provisioningState
